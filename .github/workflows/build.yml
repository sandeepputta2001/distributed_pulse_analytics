name: Build & Test

on:
  push:
    branches: [main, staging, "feature/**"]
  pull_request:
    branches: [main, staging]

env:
  GO_VERSION: "1.22"
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  AWS_REGION: us-east-1

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=5m

      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  # ─── Build & Push Images ─────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    strategy:
      matrix:
        service:
          - name: gateway
            cmd: ./cmd/gateway
            dockerfile: deployments/docker/gateway.Dockerfile
          - name: enricher
            cmd: ./cmd/enricher
            dockerfile: deployments/docker/base.Dockerfile
          - name: session-engine
            cmd: ./cmd/session
            dockerfile: deployments/docker/base.Dockerfile
          - name: funnel-processor
            cmd: ./cmd/funnel
            dockerfile: deployments/docker/base.Dockerfile
          - name: ch-writer
            cmd: ./cmd/chwriter
            dockerfile: deployments/docker/base.Dockerfile
          - name: query-api
            cmd: ./cmd/queryapi
            dockerfile: deployments/docker/base.Dockerfile
          - name: alert-engine
            cmd: ./cmd/alertengine
            dockerfile: deployments/docker/base.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          build-args: |
            BUILD_CMD=${{ matrix.service.cmd }}
            VERSION=${{ github.sha }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/pulse-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/pulse-${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/pulse-${{ matrix.service.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          exit-code: "1"
          severity: CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif

  # ─── GitOps Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy via GitOps
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pulse-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tags
        working-directory: gitops
        run: |
          # Update all service image tags in Tanka environments
          for service in gateway enricher session-engine funnel-processor ch-writer query-api alert-engine; do
            yq e ".image.tag = \"${{ github.sha }}\"" -i \
              environments/prod/services/${service}/values.yaml 2>/dev/null || true
          done

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: deploy pulse services @ ${{ github.sha }}"
          git push
          # ArgoCD watches this repo and auto-syncs within 3 minutes
          # Argo Rollouts: canary 10% → 25% → 50% → 100%
          # Auto-rollback if error_rate > 1% or latency P95 > 500ms
