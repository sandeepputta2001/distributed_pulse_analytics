global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: pulse-local

scrape_configs:
  - job_name: pulse-gateway
    static_configs:
      - targets: ['gateway:9091']
    metrics_path: /metrics

  - job_name: pulse-enricher
    static_configs:
      - targets: ['enricher:9091']

  - job_name: pulse-session-engine
    static_configs:
      - targets: ['session-engine:9091']

  - job_name: pulse-ch-writer
    static_configs:
      - targets: ['ch-writer:9091']

  - job_name: pulse-query-api
    static_configs:
      - targets: ['query-api:9091']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9092']

  - job_name: redis
    static_configs:
      - targets: ['redis:9121']

  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:9363']

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
