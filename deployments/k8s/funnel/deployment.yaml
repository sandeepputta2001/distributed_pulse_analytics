apiVersion: apps/v1
kind: Deployment
metadata:
  name: funnel
  namespace: pulse
  labels:
    app: funnel
    component: processing
spec:
  replicas: 3
  selector:
    matchLabels:
      app: funnel
  template:
    metadata:
      labels:
        app: funnel
        component: processing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: funnel
          image: ${ECR_REGISTRY}/pulse-funnel:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /app/configs/base.yaml
            - name: PULSE_SERVICE_ENVIRONMENT
              value: production
            - name: PULSE_KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: pulse-kafka-secret
                  key: brokers
            - name: PULSE_REDIS_ADDRS
              valueFrom:
                secretKeyRef:
                  name: pulse-redis-secret
                  key: addrs
            - name: PULSE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-postgres-secret
                  key: dsn
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: configs
          configMap:
            name: pulse-configs
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: funnel
                topologyKey: kubernetes.io/hostname
---
# KEDA ScaledObject — scale on session-events Kafka consumer lag
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: funnel-scaledobject
  namespace: pulse
spec:
  scaleTargetRef:
    name: funnel
  minReplicaCount: 2
  maxReplicaCount: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-cluster:9092
        consumerGroup: funnel-group
        topic: session-events
        lagThreshold: "10000"
