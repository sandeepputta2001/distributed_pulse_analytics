# ─── Pulse Analytics — Kubernetes Secrets ─────────────────────────────────────
#
# IMPORTANT: Do NOT commit real values here.
# Use one of these approaches in production:
#   1. AWS Secrets Manager + External Secrets Operator (recommended)
#   2. Sealed Secrets (Bitnami)
#   3. HashiCorp Vault + Vault Agent Injector
#
# All values below are base64-encoded placeholders.
# Replace with: echo -n "real-value" | base64
#
# To apply with External Secrets Operator instead, see
# deployments/k8s/external-secrets/ (recommended for AWS EKS).
# ──────────────────────────────────────────────────────────────────────────────

---
# JWT signing secret for auth-service and query-api
apiVersion: v1
kind: Secret
metadata:
  name: pulse-auth-secret
  namespace: pulse
type: Opaque
stringData:
  # Generate with: openssl rand -hex 64
  jwt-secret: "REPLACE_WITH_64_CHAR_HEX_SECRET"

---
# Kafka bootstrap brokers (MSK endpoint on AWS)
apiVersion: v1
kind: Secret
metadata:
  name: pulse-kafka-secret
  namespace: pulse
type: Opaque
stringData:
  # Format: broker1:9092,broker2:9092,broker3:9092
  # On AWS MSK: find in MSK console → Cluster → View client information
  brokers: "REPLACE_WITH_MSK_BOOTSTRAP_BROKERS"

---
# Redis connection (ElastiCache on AWS)
apiVersion: v1
kind: Secret
metadata:
  name: pulse-redis-secret
  namespace: pulse
type: Opaque
stringData:
  # Cluster mode: node1:6379,node2:6379,...
  # Single node (dev): localhost:6379
  addrs: "REPLACE_WITH_ELASTICACHE_ENDPOINT:6379"
  password: ""   # set if AUTH is enabled

---
# ClickHouse connection
apiVersion: v1
kind: Secret
metadata:
  name: pulse-clickhouse-secret
  namespace: pulse
type: Opaque
stringData:
  # Comma-separated hosts for distributed cluster
  hosts: "REPLACE_WITH_CLICKHOUSE_HOST:9000"
  database: "pulse"
  username: "pulse_user"
  password: "REPLACE_WITH_CLICKHOUSE_PASSWORD"

---
# PostgreSQL DSN (RDS on AWS)
apiVersion: v1
kind: Secret
metadata:
  name: pulse-postgres-secret
  namespace: pulse
type: Opaque
stringData:
  # Format: postgres://user:pass@host:5432/dbname?sslmode=require
  dsn: "postgres://pulse_user:REPLACE_PASSWORD@REPLACE_RDS_ENDPOINT:5432/pulse?sslmode=require"

---
# MongoDB URI (DocumentDB on AWS or Atlas)
apiVersion: v1
kind: Secret
metadata:
  name: pulse-mongo-secret
  namespace: pulse
type: Opaque
stringData:
  uri: "mongodb://pulse_user:REPLACE_PASSWORD@REPLACE_DOCDB_ENDPOINT:27017/pulse?tls=true&replicaSet=rs0"

---
# Image pull secret for AWS ECR
# Created automatically by ECR Credential Helper on EKS with IRSA.
# If using self-managed nodes, create with:
#   aws ecr get-login-password | kubectl create secret docker-registry ecr-creds \
#     --docker-server=<ECR_REGISTRY> --docker-username=AWS --docker-password=- \
#     -n pulse
apiVersion: v1
kind: Secret
metadata:
  name: ecr-creds
  namespace: pulse
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REPLACE_WITH_BASE64_ECR_CONFIG"
