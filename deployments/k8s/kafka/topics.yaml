# ─── Strimzi KafkaTopic resources — PulseAnalytics ────────────────────────────
# Applied via Strimzi Entity Operator when running in-cluster (dev/CI).
# For managed Kafka (Confluent Cloud / GCP), topics are provisioned via Terraform
# (deployments/terraform/modules/kafka/main.tf) and the kafka-setup-job.yaml
# below handles idempotent creation for non-Terraform environments.
#
# Topic specs per LLD §10.1.
# ─────────────────────────────────────────────────────────────────────────────

# ── raw-events ────────────────────────────────────────────────────────────────
# Gateway → Kafka. Key = app_id:device_id for per-device ordering.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: raw-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "172800000"       # 48 h — gives CH-Writer 48h to recover without data loss
    compression.type: "snappy"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"           # 1-h segments for faster log compaction
    max.message.bytes: "5242880"    # 5 MB — matches gateway body size limit
---
# ── enriched-events ───────────────────────────────────────────────────────────
# Enricher → Kafka. Carries EnrichedEvent proto; same partition count as raw-events.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: enriched-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "172800000"       # 48 h
    compression.type: "snappy"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"
    max.message.bytes: "5242880"
---
# ── session-events ────────────────────────────────────────────────────────────
# Session Engine → Kafka. Lower partition count; key = app_id.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: session-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "86400000"        # 24 h — session data has lower replay value
    compression.type: "snappy"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"
    max.message.bytes: "1048576"    # 1 MB — session payloads are small
---
# ── agg-results ───────────────────────────────────────────────────────────────
# Funnel Processor → Kafka. Aggregated conversion events; low volume.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agg-results
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 4
  replicas: 3
  config:
    retention.ms: "86400000"        # 24 h
    compression.type: "snappy"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"
    max.message.bytes: "1048576"
---
# ── dlq-events ────────────────────────────────────────────────────────────────
# Dead Letter Queue. Enricher routes unrecoverable parse failures here.
# 7-day retention for manual review; gzip for better compression of error payloads.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: dlq-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 2
  replicas: 3
  config:
    retention.ms: "604800000"       # 7 days — time for on-call to investigate
    compression.type: "gzip"
    min.insync.replicas: "1"        # DLQ: prefer availability over strict ISR
    cleanup.policy: "delete"
    segment.ms: "3600000"
    max.message.bytes: "10485760"   # 10 MB — DLQ carries original raw payload
---
# ── notifications ─────────────────────────────────────────────────────────────
# Alert Engine → Notification Service. Low volume; alert firings.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: notifications
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 2
  replicas: 3
  config:
    retention.ms: "86400000"        # 24 h — notifications must be delivered same day
    compression.type: "snappy"
    min.insync.replicas: "1"
    cleanup.policy: "delete"
    segment.ms: "3600000"
    max.message.bytes: "1048576"
