apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pulse
  labels:
    app: auth-service
    component: auth
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
        component: auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: auth-service
          image: ${ECR_REGISTRY}/pulse-authservice:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /app/configs/base.yaml
            - name: PULSE_SERVICE_ENVIRONMENT
              value: production
            - name: PULSE_REDIS_ADDRS
              valueFrom:
                secretKeyRef:
                  name: pulse-redis-secret
                  key: addrs
            - name: PULSE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-postgres-secret
                  key: dsn
            - name: PULSE_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-auth-secret
                  key: jwt-secret
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
      volumes:
        - name: configs
          configMap:
            name: pulse-configs
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: auth-service
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pulse
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: pulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
