# ─── OpenTelemetry Collector ──────────────────────────────────────────────────
#
# The OTEL Collector receives traces from all pulse services (OTLP/gRPC on :4317)
# and forwards them to Jaeger.  It also receives OTLP metrics and exposes them
# to Prometheus.
#
# Pipeline:
#   pulse services → otel-collector:4317 (OTLP gRPC)
#                 → Jaeger collector:14250 (gRPC)
#                 → Prometheus scrapes :8889 (metrics)
# ──────────────────────────────────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8889"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.102.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: prom-metrics
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config

---
# ConfigMap for the OTEL Collector pipeline
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # Memory protection — drop if collector is under pressure
      memory_limiter:
        limit_mib: 800
        spike_limit_mib: 200
        check_interval: 5s

      # Batch for efficiency
      batch:
        timeout: 5s
        send_batch_size: 512
        send_batch_max_size: 1024

      # Enrich spans with k8s pod/namespace/node metadata
      k8sattributes:
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name

      # Tail-based sampling — keep 10% of normal traffic, 100% of errors
      tail_sampling:
        decision_wait: 10s
        num_traces: 100000
        expected_new_traces_per_sec: 5000
        policies:
          - name: errors-policy
            type: status_code
            status_code: { status_codes: [ERROR] }
          - name: slow-traces-policy
            type: latency
            latency: { threshold_ms: 500 }
          - name: probabilistic-policy
            type: probabilistic
            probabilistic: { sampling_percentage: 10 }

    exporters:
      otlp/jaeger:
        endpoint: jaeger-collector.monitoring.svc.cluster.local:14250
        tls:
          insecure: true

      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: pulse_otel
        const_labels:
          cluster: pulse-prod

      # Logging exporter (debug only — disable in production)
      # logging:
      #   verbosity: detailed

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch, tail_sampling]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
    - name: prom-metrics
      port: 8889
      targetPort: prom-metrics
      protocol: TCP
  type: ClusterIP

---
# RBAC — allow OTEL collector to read pod/namespace metadata for k8sattributes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, watch, list]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: otel-collector
  apiGroup: rbac.authorization.k8s.io
