---
# ─── Prometheus — Minikube ────────────────────────────────────────────────────
# Scrapes all pulse services and infrastructure.
# Remote-writes to Mimir for long-term storage.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yaml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: minikube
        environment: development

    remote_write:
      - url: http://mimir.monitoring.svc.cluster.local:9009/api/v1/push
        headers:
          X-Scope-OrgID: pulse
        queue_config:
          max_samples_per_send: 1000
          max_shards: 5
          capacity: 2500

    scrape_configs:
      # ── Pulse Application Services ──────────────────────────────────────────
      - job_name: pulse-gateway
        static_configs:
          - targets: ['gateway.pulse.svc.cluster.local:9091']
        metrics_path: /metrics
        relabel_configs:
          - target_label: service
            replacement: gateway

      - job_name: pulse-enricher
        static_configs:
          - targets: ['enricher.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: enricher

      - job_name: pulse-session
        static_configs:
          - targets: ['session.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: session

      - job_name: pulse-chwriter
        static_configs:
          - targets: ['chwriter.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: chwriter

      - job_name: pulse-funnel
        static_configs:
          - targets: ['funnel.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: funnel

      - job_name: pulse-query-api
        static_configs:
          - targets: ['query-api.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: query-api

      - job_name: pulse-alert-engine
        static_configs:
          - targets: ['alertengine.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: alert-engine

      - job_name: pulse-auth-service
        static_configs:
          - targets: ['auth-service.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: auth-service

      - job_name: pulse-notification-service
        static_configs:
          - targets: ['notification-service.pulse.svc.cluster.local:9091']
        relabel_configs:
          - target_label: service
            replacement: notification-service

      # ── Infrastructure ──────────────────────────────────────────────────────
      - job_name: otel-collector
        static_configs:
          - targets: ['otel-collector.monitoring.svc.cluster.local:8889']

      - job_name: redis
        static_configs:
          - targets: ['redis-master.pulse.svc.cluster.local:9121']

      - job_name: clickhouse
        static_configs:
          - targets: ['clickhouse.pulse.svc.cluster.local:9363']

      - job_name: mimir
        static_configs:
          - targets: ['mimir.monitoring.svc.cluster.local:9009']
        metrics_path: /metrics

      - job_name: loki
        static_configs:
          - targets: ['loki.monitoring.svc.cluster.local:3100']
        metrics_path: /metrics

      - job_name: tempo
        static_configs:
          - targets: ['tempo.monitoring.svc.cluster.local:3200']
        metrics_path: /metrics

      # ── Kubernetes infrastructure ───────────────────────────────────────────
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: metrics
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yaml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=6h"
            - "--web.enable-lifecycle"
            - "--web.enable-remote-write-receiver"
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
