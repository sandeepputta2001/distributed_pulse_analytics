---
# ─── Locust Load Test — Minikube ─────────────────────────────────────────────
# Runs Locust in distributed mode (1 master + 2 workers) inside the cluster.
# The master exposes a web UI on port 8089 (NodePort).
#
# Deploy:
#   kubectl apply -f deployments/minikube/loadtest/locust.yaml
#
# Access UI:
#   minikube service locust-master -n loadtest
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: loadtest
  labels:
    app.kubernetes.io/part-of: pulse-analytics

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-scripts
  namespace: loadtest
data:
  locustfile.py: |
    """
    PulseAnalytics Load Test — runs inside Minikube cluster.
    Targets the gateway service directly via ClusterIP DNS.
    """
    import random
    import time
    import uuid

    from locust import HttpUser, TaskSet, between, events, task

    EVENT_TYPES = [
        "page_view", "button_click", "form_submit", "purchase",
        "add_to_cart", "search", "video_play", "signup", "login",
    ]
    APP_IDS  = [f"app_{i:04d}" for i in range(1, 6)]
    USER_IDS = [str(uuid.uuid4()) for _ in range(200)]

    def make_batch(app_id, size=None):
        if size is None:
            size = random.choices([1,5,10,25,50], weights=[30,25,20,15,10])[0]
        return {
            "app_id": app_id,
            "events": [{
                "event_id":   str(uuid.uuid4()),
                "event_type": random.choice(EVENT_TYPES),
                "app_id":     app_id,
                "user_id":    random.choice(USER_IDS),
                "device_id":  str(uuid.uuid4()),
                "timestamp":  int(time.time() * 1000),
                "properties": {
                    "page":    f"/page/{random.randint(1,50)}",
                    "country": random.choice(["US","IN","GB","DE","FR"]),
                },
            } for _ in range(size)],
        }

    class IngestTasks(TaskSet):
        def on_start(self):
            self.app_id = random.choice(APP_IDS)
            self.headers = {
                "Content-Type": "application/json",
                "X-API-Key": f"test-api-key-{self.app_id}",
            }

        @task(75)
        def ingest_small(self):
            payload = make_batch(self.app_id, size=random.randint(1, 10))
            with self.client.post("/v1/events", json=payload, headers=self.headers,
                                  catch_response=True, name="/v1/events [small]") as r:
                if r.status_code == 200:
                    r.success()
                elif r.status_code == 429:
                    r.failure("rate limited")
                else:
                    r.failure(f"{r.status_code}")

        @task(20)
        def ingest_medium(self):
            payload = make_batch(self.app_id, size=random.randint(25, 100))
            with self.client.post("/v1/events", json=payload, headers=self.headers,
                                  catch_response=True, name="/v1/events [medium]") as r:
                if r.status_code == 200:
                    r.success()
                else:
                    r.failure(f"{r.status_code}")

        @task(5)
        def health(self):
            self.client.get("/health", name="/health")

    class SDKUser(HttpUser):
        tasks     = [IngestTasks]
        wait_time = between(0.05, 0.5)

    @events.test_start.add_listener
    def on_start(environment, **kwargs):
        print(f"Load test started against {environment.host}")

---
# ─── Locust Master ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: loadtest
  labels:
    app: locust
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      role: master
  template:
    metadata:
      labels:
        app: locust
        role: master
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9646"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: locust-master
          image: locustio/locust:2.29.1
          args:
            - "--master"
            - "--locustfile=/locust/locustfile.py"
            - "--host=http://gateway.pulse.svc.cluster.local:8080"
            - "--web-port=8089"
            - "--expect-workers=2"
          ports:
            - name: web
              containerPort: 8089
            - name: master-bind
              containerPort: 5557
            - name: master-bind2
              containerPort: 5558
          volumeMounts:
            - name: locust-scripts
              mountPath: /locust
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts

---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
  namespace: loadtest
  labels:
    app: locust
    role: master
spec:
  selector:
    app: locust
    role: master
  ports:
    - name: web
      port: 8089
      targetPort: 8089
    - name: master-bind
      port: 5557
      targetPort: 5557
    - name: master-bind2
      port: 5558
      targetPort: 5558
  type: NodePort

---
# ─── Locust Workers ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: loadtest
  labels:
    app: locust
    role: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust
      role: worker
  template:
    metadata:
      labels:
        app: locust
        role: worker
    spec:
      containers:
        - name: locust-worker
          image: locustio/locust:2.29.1
          args:
            - "--worker"
            - "--locustfile=/locust/locustfile.py"
            - "--master-host=locust-master.loadtest.svc.cluster.local"
          volumeMounts:
            - name: locust-scripts
              mountPath: /locust
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts
