---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertengine
  namespace: pulse
  labels:
    app: alertengine
    component: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertengine
  template:
    metadata:
      labels:
        app: alertengine
        component: alerting
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: alertengine
          image: pulse-alertengine:dev
          imagePullPolicy: Never
          ports:
            - name: metrics
              containerPort: 9091
          env:
            - name: CONFIG_PATH
              value: /app/configs/alertengine.yaml
            - name: PULSE_SERVICE_ENVIRONMENT
              value: development
            - name: PULSE_CLICKHOUSE_HOSTS
              valueFrom:
                secretKeyRef:
                  name: pulse-clickhouse-secret
                  key: hosts
            - name: PULSE_REDIS_ADDRS
              valueFrom:
                secretKeyRef:
                  name: pulse-redis-secret
                  key: addrs
            - name: PULSE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-postgres-secret
                  key: dsn
            - name: PULSE_OTEL_ENDPOINT
              value: "otel-collector.monitoring.svc.cluster.local:4317"
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: configs
          configMap:
            name: pulse-configs
---
apiVersion: v1
kind: Service
metadata:
  name: alertengine
  namespace: pulse
  labels:
    app: alertengine
spec:
  selector:
    app: alertengine
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
  type: ClusterIP
