---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: pulse
  labels:
    app: query-api
    component: serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
        component: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: query-api
          image: pulse-query-api:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8082
            - name: metrics
              containerPort: 9091
          env:
            - name: CONFIG_PATH
              value: /app/configs/queryapi.yaml
            - name: PULSE_SERVICE_ENVIRONMENT
              value: development
            - name: PULSE_CLICKHOUSE_HOSTS
              valueFrom:
                secretKeyRef:
                  name: pulse-clickhouse-secret
                  key: hosts
            - name: PULSE_REDIS_ADDRS
              valueFrom:
                secretKeyRef:
                  name: pulse-redis-secret
                  key: addrs
            - name: PULSE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-postgres-secret
                  key: dsn
            - name: PULSE_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-auth-secret
                  key: jwt-secret
            - name: PULSE_OTEL_ENDPOINT
              value: "otel-collector.monitoring.svc.cluster.local:4317"
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: configs
          configMap:
            name: pulse-configs
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: pulse
  labels:
    app: query-api
spec:
  selector:
    app: query-api
  ports:
    - name: http
      port: 8082
      targetPort: 8082
    - name: metrics
      port: 9091
      targetPort: 9091
  type: NodePort
