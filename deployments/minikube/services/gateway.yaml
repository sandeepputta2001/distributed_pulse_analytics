---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pulse
  labels:
    app: gateway
    component: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        component: ingest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: pulse-gateway:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9091
          env:
            - name: CONFIG_PATH
              value: /app/configs/gateway.yaml
            - name: PULSE_SERVICE_ENVIRONMENT
              value: development
            - name: PULSE_KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: pulse-kafka-secret
                  key: brokers
            - name: PULSE_REDIS_ADDRS
              valueFrom:
                secretKeyRef:
                  name: pulse-redis-secret
                  key: addrs
            - name: PULSE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-postgres-secret
                  key: dsn
            - name: PULSE_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-auth-secret
                  key: jwt-secret
            - name: PULSE_OTEL_ENDPOINT
              value: "otel-collector.monitoring.svc.cluster.local:4317"
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: configs
          configMap:
            name: pulse-configs

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: pulse
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9091
      targetPort: 9091
  type: NodePort
