---
# ─── Pulse Analytics — Minikube Secrets (dev values only) ────────────────────
# These are plaintext dev secrets for local Minikube use ONLY.
# Never use these values in production.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: pulse-auth-secret
  namespace: pulse
type: Opaque
stringData:
  jwt-secret: "dev-jwt-secret-change-me-in-production-64chars-padding-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: pulse-kafka-secret
  namespace: pulse
type: Opaque
stringData:
  brokers: "pulse-kafka-kafka-bootstrap.pulse.svc.cluster.local:9092"
  api-key: ""
  api-secret: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: pulse-redis-secret
  namespace: pulse
type: Opaque
stringData:
  addrs: "redis-master.pulse.svc.cluster.local:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: pulse-clickhouse-secret
  namespace: pulse
type: Opaque
stringData:
  hosts: "clickhouse.pulse.svc.cluster.local:9000"
  username: "pulse"
  password: "pulse"

---
apiVersion: v1
kind: Secret
metadata:
  name: pulse-postgres-secret
  namespace: pulse
type: Opaque
stringData:
  dsn: "postgres://pulse:pulse@postgres.pulse.svc.cluster.local:5432/pulse?sslmode=disable"

---
apiVersion: v1
kind: Secret
metadata:
  name: pulse-mongo-secret
  namespace: pulse
type: Opaque
stringData:
  uri: "mongodb://mongo.pulse.svc.cluster.local:27017"

---
# Grafana admin credentials
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "pulse-admin"
