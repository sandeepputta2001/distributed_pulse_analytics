---
# ─── Strimzi Kafka — Minikube (single-node, minimal resources) ───────────────
# Prerequisites:
#   kubectl apply -f https://strimzi.io/install/latest?namespace=pulse
#
# This is a single-broker, single-ZK setup for local dev.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: pulse-kafka
  namespace: pulse
spec:
  kafka:
    version: 3.7.0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      log.retention.ms: 3600000       # 1h for dev
      log.retention.check.interval.ms: 300000
      num.partitions: 4
      compression.type: snappy
      message.max.bytes: 5242880
    storage:
      type: ephemeral
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "100m"
    userOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "100m"

---
# ─── Kafka Topics (single-replica for Minikube) ───────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: raw-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 4
  replicas: 1
  config:
    retention.ms: "3600000"
    compression.type: "snappy"
    cleanup.policy: "delete"
    max.message.bytes: "5242880"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: enriched-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 4
  replicas: 1
  config:
    retention.ms: "3600000"
    compression.type: "snappy"
    cleanup.policy: "delete"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: session-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 2
  replicas: 1
  config:
    retention.ms: "3600000"
    compression.type: "snappy"
    cleanup.policy: "delete"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agg-results
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 2
  replicas: 1
  config:
    retention.ms: "3600000"
    compression.type: "snappy"
    cleanup.policy: "delete"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: dlq-events
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: "86400000"
    compression.type: "gzip"
    cleanup.policy: "delete"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: notifications
  namespace: pulse
  labels:
    strimzi.io/cluster: pulse-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: "3600000"
    compression.type: "snappy"
    cleanup.policy: "delete"
