---
# ─── ClickHouse — Minikube (single node, minimal resources) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: pulse
  labels:
    app: clickhouse
    component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        component: storage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9363"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3-alpine
          ports:
            - name: native
              containerPort: 9000
            - name: http
              containerPort: 8123
            - name: metrics
              containerPort: 9363
          env:
            - name: CLICKHOUSE_DB
              value: pulse
            - name: CLICKHOUSE_USER
              value: pulse
            - name: CLICKHOUSE_PASSWORD
              value: pulse
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: clickhouse-data
          emptyDir: {}
        - name: clickhouse-config
          configMap:
            name: clickhouse-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: pulse
data:
  metrics.xml: |
    <clickhouse>
      <prometheus>
        <endpoint>/metrics</endpoint>
        <port>9363</port>
        <metrics>true</metrics>
        <events>true</events>
        <asynchronous_metrics>true</asynchronous_metrics>
      </prometheus>
    </clickhouse>

---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: pulse
  labels:
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
    - name: metrics
      port: 9363
      targetPort: 9363
  type: ClusterIP
