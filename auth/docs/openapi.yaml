openapi: "3.0.3"
info:
  title: PulseAnalytics — Auth Service
  version: "1.0.0"
  description: JWT token issuance, API key management, and org/app registration.
servers:
  - url: http://localhost:8083

tags:
  - name: auth
    description: Authentication endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TokenResponse:
      type: object
      properties:
        token:   { type: string }
        org_id:  { type: string }
        app_id:  { type: string }
        expires: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error: { type: string }

paths:
  /v1/auth/register:
    post:
      summary: Register new org + app
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_name, email]
              properties:
                org_name: { type: string }
                app_name: { type: string }
                email:    { type: string, format: email }
      responses:
        "201":
          description: Org and app created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/TokenResponse'
                  - type: object
                    properties:
                      api_key: { type: string }
        "400":
          description: Missing required fields

  /v1/auth/token:
    post:
      summary: Exchange API key for JWT
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Invalid API key

  /v1/auth/refresh:
    post:
      summary: Refresh expiring JWT
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: New JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Invalid or expired token

  /v1/auth/validate:
    get:
      summary: Validate JWT (internal)
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token valid
        "401":
          description: Invalid token

  /v1/auth/apikey/rotate:
    post:
      summary: Rotate API key
      tags: [auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id]
              properties:
                app_id: { type: string }
      responses:
        "200":
          description: New API key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_id:  { type: string }
                  api_key: { type: string }
        "400":
          description: app_id required
