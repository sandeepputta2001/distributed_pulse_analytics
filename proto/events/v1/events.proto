syntax = "proto3";

package events.v1;

option go_package = "github.com/pulse-analytics/proto/events/v1;eventsv1";

import "google/protobuf/struct.proto";

// ─── Ingest Payload ───────────────────────────────────────────────────────────

message EventBatch {
  string app_id      = 1;
  string device_id   = 2;
  string user_id     = 3;
  string sdk_version = 4;
  int64  sent_at_ms  = 5;
  repeated Event events = 6;
}

message Event {
  string event_id   = 1;
  string event_name = 2;
  int64  event_time = 3;   // epoch ms (client clock)
  map<string, google.protobuf.Value> props = 4;
  DeviceContext device = 5;
  AppContext    app    = 6;
  double        revenue = 7;
}

message DeviceContext {
  string device_model   = 1;
  string os             = 2;
  string os_version     = 3;
  string manufacturer   = 4;
  string screen_size    = 5;
  string network_type   = 6;
  string language       = 7;
  string timezone       = 8;
  string carrier        = 9;
  bool   is_tablet      = 10;
}

message AppContext {
  string version     = 1;
  string build       = 2;
  string platform    = 3;  // android | ios | web | react_native | flutter | server
  string environment = 4;  // production | development
}

// ─── Enriched Event (internal, after enrichment service) ─────────────────────

message EnrichedEvent {
  Event  raw         = 1;
  string app_id      = 2;
  string user_id     = 3;
  string device_id   = 4;
  string session_id  = 5;
  int64  server_time = 6;   // server-side epoch ms
  int64  client_offset_ms = 7;

  // GeoIP enrichment
  string country_code = 8;
  string country_name = 9;
  string region       = 10;
  string city         = 11;
  double latitude     = 12;
  double longitude    = 13;

  // UA enrichment
  string browser         = 14;
  string browser_version = 15;
  string os_family       = 16;

  // Attribution
  string install_source = 17;
  string campaign_id    = 18;
  string adset_id       = 19;
}

// ─── Session ─────────────────────────────────────────────────────────────────

message SessionState {
  string session_id       = 1;
  string app_id           = 2;
  string user_id          = 3;
  string device_id        = 4;
  int64  start_time_ms    = 5;
  int64  last_event_ms    = 6;
  int32  event_count      = 7;
  repeated string screens = 8;
  string entry_screen     = 9;
}

message SessionEvent {
  string session_id        = 1;
  string app_id            = 2;
  string user_id           = 3;
  string device_id         = 4;
  int64  start_time_ms     = 5;
  int64  end_time_ms       = 6;
  int64  duration_s        = 7;
  int32  event_count       = 8;
  repeated string screens  = 9;
  string entry_screen      = 10;
  string exit_screen       = 11;
  string exit_reason       = 12; // background | crash | timeout
  string type              = 13; // session_start | session_end
}

// ─── Funnel ──────────────────────────────────────────────────────────────────

message FunnelDefinition {
  string funnel_id   = 1;
  string app_id      = 2;
  string name        = 3;
  repeated string steps = 4;
  int64  window_seconds = 5; // e.g. 604800 for 7 days
}

message FunnelState {
  string funnel_id        = 1;
  string user_id          = 2;
  int32  completed_steps  = 3;
  repeated int64 step_timestamps = 4;
  bool   converted        = 5;
}

// ─── Query API ───────────────────────────────────────────────────────────────

message EventCountRequest {
  string app_id     = 1;
  string event_name = 2;
  int64  from_ms    = 3;
  int64  to_ms      = 4;
  string granularity = 5; // minute | hour | day
  repeated string group_by = 6;
}

message EventCountResponse {
  repeated DataPoint points = 1;
  int64 total = 2;
}

message DataPoint {
  int64  timestamp_ms = 1;
  double value        = 2;
  map<string, string> dimensions = 3;
}

message FunnelQueryRequest {
  string app_id          = 1;
  repeated string steps  = 2;
  int64  window_seconds  = 3;
  int64  from_ms         = 4;
  int64  to_ms           = 5;
}

message FunnelQueryResponse {
  repeated FunnelStep steps = 1;
}

message FunnelStep {
  string event_name    = 1;
  int64  user_count    = 2;
  double conversion_rate = 3;
  double drop_off_rate = 4;
}

message RetentionRequest {
  string app_id  = 1;
  int64  from_ms = 2;
  int64  to_ms   = 3;
  repeated int32 day_ns = 4; // [1, 3, 7, 14, 30]
}

message RetentionResponse {
  repeated RetentionCohort cohorts = 1;
}

message RetentionCohort {
  string install_date = 1;
  int64  cohort_size  = 2;
  map<string, double> day_n_rates = 3; // "day_1" -> 0.45
}

message DAURequest {
  string app_id     = 1;
  int64  from_ms    = 2;
  int64  to_ms      = 3;
  string granularity = 4;
}

message DAUResponse {
  repeated DataPoint points = 1;
}
