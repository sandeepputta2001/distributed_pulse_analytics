version: "3.9"

services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    image: pulse-analytics/gateway:latest
    container_name: pulse-gateway
    ports:
      - "8080:8080"   # HTTP API
      - "9091:9091"   # Prometheus metrics
    environment:
      - PULSE_SERVICE_ENVIRONMENT=development
      - CONFIG_PATH=configs/config.yaml
      - PULSE_KAFKA_BROKERS=kafka:9092
      - PULSE_REDIS_ADDRS=redis:6379
      - PULSE_POSTGRES_DSN=postgres://pulse:pulse@postgres:5432/pulse?sslmode=disable
      - PULSE_MONGO_URI=mongodb://mongo:27017
      - PULSE_AUTH_JWTSECRET=${PULSE_AUTH_JWTSECRET:-change-me-in-production-min-32-chars}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pulse-net

  # ── Infrastructure (for standalone gateway dev) ────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pulse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pulse-net

  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pulse-net

  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pulse-net

  mongo:
    image: mongo:7
    container_name: pulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pulse-net

networks:
  pulse-net:
    driver: bridge

volumes:
  pg-data:
  mongo-data:
