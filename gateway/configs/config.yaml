service:
  name: gateway
  environment: development
  loglevel: info

http:
  host: "0.0.0.0"
  port: 8080
  readtimeout: 10s
  writetimeout: 30s
  idletimeout: 60s
  shutdowntimeout: 15s
  maxbodybytes: 10485760   # 10MB

kafka:
  brokers: ["localhost:9092"]
  topicrawevents: raw-events
  topicenriched: enriched-events
  topicsession: session-events
  topicaggresults: agg-results
  topicdlq: dlq-events
  producerbatch: 1000
  producerlinger: 5ms
  acks: leader
  compression: snappy

redis:
  addrs: ["localhost:6379"]
  poolsize: 50
  maxretries: 3
  dialtimeout: 5s
  readtimeout: 3s
  writetimeout: 3s

postgres:
  dsn: "postgres://pulse:pulse@localhost:5432/pulse?sslmode=disable"
  maxopenconn: 25
  maxidleconn: 5
  maxlifetime: 30m

mongo:
  uri: "mongodb://localhost:27017"
  database: pulse
  timeout: 10s
  readpreference: secondaryPreferred

geoip:
  dbpath: "/data/GeoLite2-City.mmdb"

auth:
  jwtsecret: "change-me-in-production-min-32-chars"
  apikeycachettl: 5m
  jwtexpiry: 24h

ratelimit:
  enabled: true
  defaultrps: 10000.0
  defaultburst: 50000
  cleanupinterval: 5m

bloom:
  capacity: 1000000000
  falsepositive: 0.001
  windowttl: 24h

telemetry:
  otlpendpoint: "localhost:4317"
  prometheusport: 9091
  samplingrate: 0.001
  metricsenabled: true
  tracingenabled: true
